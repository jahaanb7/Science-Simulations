name: Build ParticleSimulation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:

          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            name: macOS
            artifact_path: build/ParticleSimulation
            artifact_name: ParticleSimulation-macOS

          # ── Linux ──────────────────────────────────────────────────────────
          - os: ubuntu-latest
            name: Linux
            artifact_path: build/ParticleSimulation
            artifact_name: ParticleSimulation-Linux

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            name: Windows
            artifact_path: build/Release/ParticleSimulation.exe
            artifact_name: ParticleSimulation-Windows

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── macOS dependencies ─────────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install glfw glm

      # ── Linux dependencies ─────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglfw3-dev \
            libglm-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            xorg-dev

      # ── Windows dependencies ───────────────────────────────────────────────
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install glfw3:x64-windows glm:x64-windows

      # ── Configure CMake (macOS + Linux) ───────────────────────────────────
      - name: Configure CMake (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: cmake -S ParticleSimulation -B build

      # ── Configure CMake (Windows) ──────────────────────────────────────────
      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S ParticleSimulation -B build `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error