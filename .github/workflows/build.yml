name: Build ParticleSimulation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:

          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            name: macOS
            artifact_path: build/ParticleSimulation
            artifact_name: ParticleSimulation-macOS

          # ── Linux ──────────────────────────────────────────────────────────
          - os: ubuntu-latest
            name: Linux
            artifact_path: build/ParticleSimulation
            artifact_name: ParticleSimulation-Linux

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            name: Windows
            artifact_path: build/Release/ParticleSimulation.exe
            artifact_name: ParticleSimulation-Windows

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Linux dependencies ─────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            xorg-dev

      # ── Ensure clean build dir ─────────────────────────────────────────────
      - name: Remove stale build directory
        run: cmake -E rm -rf build

      # ── Configure CMake ────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake -S ParticleSimulation -B build -DPARTICLE_ALLOW_FETCH_DEPS=ON

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
